<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Project — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/dashboard.css" />
    <!-- Quill Rich Text CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script type="module" src="/auth-guard.js"></script>
    <style>
        .form-layout { max-width: 800px; }
        .form-row { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; }
        .form-col { flex: 1; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--gray); font-size: 0.9rem; }
        .form-group input[type="text"], .form-group select { width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); color: var(--text); border-radius: 0.5rem; }
        /* Quill Adjustments */
        .ql-toolbar.ql-snow { border: 1px solid rgba(255,255,255,0.05); border-radius: 0.5rem 0.5rem 0 0; background: rgba(255,255,255,0.01); border-bottom: none;}
        .ql-container.ql-snow { border: 1px solid rgba(255,255,255,0.05); border-radius: 0 0 0.5rem 0.5rem; min-height: 200px; font-family: inherit; font-size: 1rem; }
        .ql-editor { color: var(--text); }
        .ql-snow .ql-stroke { stroke: var(--text); }
        .ql-snow .ql-fill { fill: var(--text); }
        .ql-snow .ql-picker { color: var(--text); }
        /* File Upload */
        .file-upload-box { border: 2px dashed rgba(255,255,255,0.1); padding: 2rem; border-radius: 0.5rem; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 0.5rem; }
        .file-upload-box:hover { border-color: var(--primary); background: rgba(42, 110, 245, 0.05); }
        .file-upload-box input[type="file"] { display: none; }
        .file-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--gray); }
    </style>
</head>
<body class="dashboard-body">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo"><img src="image/logo.png" alt="Khaled Shaaban" class="site-logo"></div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                All Projects
            </a>
            <a href="/dashboard/projects/new" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add New Project
            </a>
            <a href="/dashboard/briefs" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Client Briefs
            </a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <div class="header-left">
                <div class="mobile-menu-trigger"><span></span><span></span><span></span></div>
                <h1>Add New Project</h1>
            </div>
        </header>

        <div class="dashboard-content">
            <form id="newProjectForm" class="form-layout">
                <div class="form-row">
                    <div class="form-col form-group">
                        <label>Project Name</label>
                        <input type="text" id="projectName" required />
                    </div>
                    <div class="form-col form-group">
                        <label>Client Name</label>
                        <input type="text" id="clientName" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col form-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Brand Identity">Brand Identity</option>
                            <option value="Logo Design">Logo Design</option>
                            <option value="Rebranding">Rebranding</option>
                            <option value="Brand Guidelines">Brand Guidelines</option>
                            <option value="Social Media">Social Media</option>
                        </select>
                    </div>
                    <div class="form-col form-group">
                        <label>Status</label>
                        <select id="status" required>
                            <option value="New">New</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label>Project Description</label>
                    <div id="editor"></div>
                </div>

                <div class="form-row">
                    <div class="form-col form-group">
                        <label>Thumbnail & Gallery (Multi-Image, Max 10)</label>
                        <label class="file-upload-box">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:0.5rem; color:var(--primary);"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg><br>
                            Click to Select Images
                            <input type="file" id="imagesUpload" accept="image/*" multiple />
                        </label>
                        <div class="file-list" id="imagesList">No images selected</div>
                    </div>

                    <div class="form-col form-group">
                        <label>Brand Guidelines (PDF, Max 1)</label>
                        <label class="file-upload-box">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:0.5rem; color:var(--primary);"><path d="M14 2v6h6M14 2L4 2a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8z"></path></svg><br>
                            Click to Select PDF
                            <input type="file" id="pdfUpload" accept="application/pdf" />
                        </label>
                        <div class="file-list" id="pdfList">No PDF selected</div>
                    </div>
                </div>

                <div style="text-align: right; margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 2rem;">
                    <button type="submit" class="btn-primary" id="saveBtn">Save Project</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script type="module" src="/dashboard-project-new.js"></script>
</body>
</html>
