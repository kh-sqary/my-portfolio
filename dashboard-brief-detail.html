<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brief Details — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/dashboard.css" />
    <script type="module" src="/auth-guard.js"></script>
    <style>
        .detail-header { display: flex; justify-content: space-between; align-items:flex-start; margin-bottom: 2rem; }
        .back-btn { color: var(--gray); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; transition: 0.3s; }
        .back-btn:hover { color: var(--primary); }
        .detail-title { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 0.5rem; }
        .detail-info { color: var(--gray); display: flex; gap: 1rem; font-size: 0.95rem; margin-bottom: 2rem;}

        .actions-col { display: flex; flex-direction: column; gap: 1rem; align-items: flex-end;}
        .actions-group { display: flex; gap: 1rem; align-items: center; }
        .status-dropdown { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 0.6rem 1rem; border-radius: 0.5rem; font-family: inherit; font-size: 0.9rem; cursor: pointer; }
        
        .brief-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        @media (max-width: 900px) { .brief-grid { grid-template-columns: 1fr; } }
        
        .answer-block { background: rgba(255,255,255,0.02); padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 1.5rem; }
        .answer-block h4 { color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .answer-block p { line-height: 1.6; margin-bottom: 0.5rem; }
        .answer-block strong { color: var(--gray); display: inline-block; width: 140px;}

        .link-project-widget { background: rgba(42, 110, 245, 0.05); border: 1px solid rgba(42, 110, 245, 0.2); padding: 1.5rem; border-radius: 1rem; }
        .link-project-widget h4 { font-family: var(--font-display); margin-bottom: 1rem; font-size: 1.2rem; }
        .link-project-widget p { color: var(--gray); font-size: 0.9rem; margin-bottom: 1rem; }
        .project-select { width: 100%; padding: 0.85rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 0.5rem; margin-bottom: 1rem;}
    </style>
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-logo"><img src="image/logo.png" alt="Khaled Shaaban" class="site-logo"></div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                All Projects
            </a>
            <a href="/dashboard/projects/new" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add New Project
            </a>
            <a href="/dashboard/briefs" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Client Briefs
            </a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <header class="dashboard-header">
            <div class="header-left">
                <div class="mobile-menu-trigger"><span></span><span></span><span></span></div>
                <h1>Brief View</h1>
            </div>
            
            <div class="header-right actions-group">
                <select class="status-dropdown" id="briefStatus">
                    <option value="New">New</option>
                    <option value="Under Review">Under Review</option>
                    <option value="Accepted">Accepted</option>
                    <option value="Rejected">Rejected</option>
                </select>
                <button class="btn-primary sm" id="deleteBriefBtn" style="background: rgba(255, 74, 74, 0.1); color: #ff4a4a; border-color: transparent;">Delete</button>
            </div>
        </header>

        <div class="dashboard-content">
            <a href="/dashboard/briefs" class="back-btn">← Back to Briefs</a>
            
            <div class="detail-header" id="briefHeader">
                <div>
                    <h2 class="detail-title">Loading...</h2>
                    <div class="detail-info" id="briefMeta"></div>
                </div>
            </div>

            <div class="brief-grid">
                <div class="main-answers" id="answersContainer">
                    <!-- Answers mapped in JS -->
                </div>
                <div class="side-panel">
                    <div class="link-project-widget">
                        <h4>Link to Project</h4>
                        <p>Attach this brief's answers to an existing project's "Client Brief" tab.</p>
                        <select id="projectSelect" class="project-select">
                            <option value="">Select a project...</option>
                            <!-- Populated via JS -->
                        </select>
                        <button class="btn-primary" id="linkProjectBtn" style="width:100%;">Link Project</button>
                        <div id="linkSuccess" style="color:#2af56e; font-size:0.85rem; margin-top:1rem; display:none;">Linked successfully!</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/dashboard-brief-detail.js"></script>
</body>
</html>
